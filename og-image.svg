<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#FBFAF6"/>
  <g opacity="0.5">
    <rect x="0" y="0" width="1200" height="630" fill="url(#grid)"/>
  </g>
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#F1EFE8" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Brand mark -->
  <g transform="translate(96 150)">
    <rect x="0"   y="0"   width="56" height="56" rx="10" fill="#1D9E75"/>
    <rect x="68"  y="0"   width="56" height="56" rx="10" fill="#1D9E75"/>
    <rect x="136" y="0"   width="56" height="56" rx="10" fill="#1D9E75"/>
    <rect x="0"   y="68"  width="56" height="56" rx="10" fill="#1D9E75"/>
    <rect x="68"  y="68"  width="56" height="56" rx="10" fill="#1D9E75"/>
    <rect x="136" y="68"  width="56" height="56" rx="28" fill="#5DCAA5"/>
    <rect x="0"   y="136" width="56" height="56" rx="28" fill="#5DCAA5"/>
    <circle cx="96"  cy="164" r="28" fill="#9FE1CB"/>
    <circle cx="164" cy="164" r="20" fill="#9FE1CB" opacity="0.7"/>
  </g>

  <text x="96" y="430" font-family="DM Sans, Helvetica, Arial, sans-serif" font-size="76" font-weight="600" fill="#2C2C2A">Pixel-perfect websites.</text>
  <text x="96" y="510" font-family="DM Sans, Helvetica, Arial, sans-serif" font-size="76" font-weight="600" fill="#1D9E75">Built to grow.</text>

  <text x="96" y="575" font-family="DM Sans, Helvetica, Arial, sans-serif" font-size="30" fill="#888780">pixlgrove.com — web design &amp; development studio</text>
</svg>
